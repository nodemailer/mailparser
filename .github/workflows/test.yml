name: Run tests

on:
    push:
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Test (Node.js ${{ matrix.node }})
        timeout-minutes: 10
        strategy:
            fail-fast: false
            matrix:
                node: [22.x, 24.x]
                os: [ubuntu-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js ${{ matrix.node }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm
            - run: npm install
            - run: npm test
